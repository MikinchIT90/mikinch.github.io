<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikinch | Liquid Glass</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            background: #0a0a0c;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Живой фон */
        .ocean {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: -2;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(45deg, #00dbde, #fc00ff);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.4;
            animation: move 25s infinite alternate;
        }

        @keyframes move {
            0% { transform: translate(-20%, -20%) rotate(0deg); }
            100% { transform: translate(30%, 20%) rotate(360deg); }
        }

        /* Стеклянная карточка */
        .glass-panel {
            width: 90%;
            max-width: 1100px;
            height: 80vh;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            padding: 50px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
        }

        nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 60px;
        }

        .logo { font-weight: 800; letter-spacing: 2px; font-size: 1.2rem; }

        .hero h1 {
            font-size: clamp(2rem, 8vw, 5rem);
            line-height: 1;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, rgba(255,255,255,0.3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            max-width: 500px;
            font-size: 1.1rem;
            color: rgba(255,255,255,0.6);
            line-height: 1.6;
        }

        /* Интерактивная кнопка */
        .cta-button {
            margin-top: 40px;
            padding: 15px 40px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: white;
            text-decoration: none;
            width: fit-content;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cta-button:hover {
            background: white;
            color: black;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="ocean"></div>
    <div class="blob"></div>

    <div class="glass-panel" id="tilt">
        <nav>
            <div class="logo">MIKINCH.LAB</div>
            <div class="menu-dots">:::</div>
        </nav>

        <div class="hero">
            <h1>Liquid<br>Glass UI</h1>
            <p>Это твой новый сайт на GitHub Pages. Никаких границ, только чистый код и бесконечные возможности для творчества.</p>
            <a href="#" class="cta-button">Начать проект</a>
        </div>
    </div>

    <script>
        const card = document.getElementById('tilt');
        
        // Эффект наклона карточки при движении мыши
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 30;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 30;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
    </script>
</body>
</html>
